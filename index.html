<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Xu Costura - Demo WhatsApp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;}

/* PHONE FRAME */
.phone{width:375px;height:760px;background:#000;border-radius:50px;box-shadow:0 0 0 10px #1a1a1a,0 0 0 12px #333,0 40px 80px rgba(0,0,0,.8);position:relative;overflow:hidden;}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:30px;background:#000;border-radius:0 0 18px 18px;z-index:100;}
.phone-screen{position:absolute;inset:0;border-radius:50px;overflow:hidden;display:flex;flex-direction:column;}

/* STATUS BAR */
.status-bar{background:#075e54;padding:12px 20px 6px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.status-time{color:#fff;font-size:14px;font-weight:600;}
.status-icons{display:flex;gap:5px;align-items:center;}
.status-icons svg{width:14px;height:14px;fill:#fff;}
.status-bat{color:#fff;font-size:12px;font-weight:500;}

/* WA HEADER */
.wa-header{background:#075e54;padding:8px 16px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.back-btn{color:rgba(255,255,255,.7);font-size:22px;cursor:pointer;line-height:1;}
.wa-avatar{width:38px;height:38px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.wa-avatar img{width:100%;height:100%;object-fit:cover;}
.wa-avatar-txt{font-size:15px;font-weight:600;color:#fff;}
.wa-info{flex:1;}
.wa-name{color:#fff;font-size:15px;font-weight:600;line-height:1.2;}
.wa-status{color:rgba(255,255,255,.7);font-size:12px;}
.wa-icons{display:flex;gap:18px;}
.wa-icons svg{width:22px;height:22px;fill:rgba(255,255,255,.85);}

/* CHAT BG */
.chat-bg{flex:1;overflow-y:auto;padding:8px 10px;background:#ece5dd;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth;}
.chat-bg::-webkit-scrollbar{width:0;}

/* DATE PILL */
.date-pill{text-align:center;margin:6px 0;}
.date-pill span{background:rgba(255,255,255,.75);color:#667781;font-size:11.5px;padding:4px 10px;border-radius:7px;box-shadow:0 1px 1px rgba(0,0,0,.08);}

/* MESSAGES */
.msg{display:flex;flex-direction:column;max-width:82%;}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;}

.bubble{padding:7px 10px 5px;border-radius:8px;position:relative;box-shadow:0 1px 1px rgba(0,0,0,.12);}
.msg.bot .bubble{background:#fff;border-radius:0 8px 8px 8px;}
.msg.user .bubble{background:#dcf8c6;border-radius:8px 8px 0 8px;}

.bubble-text{font-size:14px;color:#111;line-height:1.45;word-break:break-word;}
.bubble-meta{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:2px;}
.bubble-time{font-size:11px;color:#667781;}
.tick{width:15px;height:10px;}
.tick-single path{fill:#667781;}
.tick-blue path{fill:#53bdeb;}

/* BUSINESS LABEL */
.biz-label{background:#fff;border-radius:0 8px 8px 8px;padding:6px 10px;font-size:12px;color:#8696a0;display:flex;align-items:center;gap:5px;max-width:82%;box-shadow:0 1px 1px rgba(0,0,0,.1);}
.biz-label svg{width:14px;height:14px;fill:#25d366;flex-shrink:0;}

/* QUICK REPLY BUTTONS */
.qr-wrap{display:flex;flex-wrap:wrap;gap:5px;max-width:82%;margin-top:2px;}
.qr-btn{background:#fff;border:1px solid #d9fdd3;border-radius:20px;padding:7px 14px;font-size:13px;color:#007bff;cursor:pointer;font-family:inherit;transition:background .15s;box-shadow:0 1px 1px rgba(0,0,0,.08);}
.qr-btn:hover{background:#f0f9ff;}
.qr-btn:active{background:#e0f2fe;}

/* TYPING */
.typing-bubble{background:#fff;border-radius:0 8px 8px 8px;padding:10px 14px;box-shadow:0 1px 1px rgba(0,0,0,.12);align-self:flex-start;}
.typing-dots{display:flex;gap:4px;align-items:center;}
.tdot{width:7px;height:7px;background:#8696a0;border-radius:50%;animation:td 1.2s infinite;}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* INPUT BAR */
.input-bar{background:#f0f2f5;padding:8px 10px;display:flex;align-items:flex-end;gap:8px;flex-shrink:0;}
.input-wrap{flex:1;background:#fff;border-radius:22px;display:flex;align-items:center;padding:8px 14px;gap:8px;}
.emoji-btn{font-size:20px;cursor:pointer;flex-shrink:0;}
.chat-input{flex:1;border:none;outline:none;font-size:14px;font-family:inherit;color:#111;background:transparent;resize:none;max-height:80px;}
.chat-input::placeholder{color:#8696a0;}
.attach-btn{font-size:18px;cursor:pointer;color:#8696a0;}
.send-btn{width:44px;height:44px;border-radius:50%;background:#00a884;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.send-btn:hover{background:#008f6f;}
.send-btn svg{width:20px;height:20px;fill:#fff;margin-left:2px;}
.mic-btn{width:44px;height:44px;border-radius:50%;background:#00a884;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mic-btn svg{width:20px;height:20px;fill:#fff;}

/* INTRO SCREEN */
.intro{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;z-index:50;border-radius:50px;}
.intro-logo{width:80px;height:80px;background:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 8px 24px rgba(37,211,102,.3);}
.intro-logo svg{width:44px;height:44px;fill:#fff;}
.intro h2{font-size:20px;font-weight:700;color:#111;margin-bottom:.5rem;}
.intro p{font-size:14px;color:#667781;line-height:1.6;margin-bottom:2rem;}
.intro-start{background:#25d366;color:#fff;border:none;border-radius:25px;padding:13px 32px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(37,211,102,.4);}
.intro-start:active{transform:scale(.97);}

/* OUTSIDE LABEL */
.outside{text-align:center;padding:2rem 1rem 1rem;}
.outside p{color:rgba(255,255,255,.4);font-size:13px;line-height:1.6;}
.outside strong{color:rgba(255,255,255,.7);display:block;margin-bottom:.4rem;font-size:15px;}

@media(max-width:420px){
  body{background:#ece5dd;align-items:flex-start;}
  .phone{width:100%;height:100vh;border-radius:0;box-shadow:none;}
  .phone-notch{display:none;}
  .phone-screen{border-radius:0;}
  .intro{border-radius:0;}
  .outside{display:none;}
}
</style>
</head>

<script>

var cinput = document.getElementById('cinput');

var started = false;

cinput.addEventListener('input', function(){
  if(cinput.value.trim()){sendbtn.style.display='flex';micbtn.style.display='none';}
  else{sendbtn.style.display='none';micbtn.style.display='flex';}

  'direccion': [

];

function norm(s){
  return s.toLowerCase()
    .replace(/&aacute;/g,'a').replace(/&eacute;/g,'e').replace(/&iacute;/g,'i').replace(/&oacute;/g,'o').replace(/&uacute;/g,'u')
    .replace(/&ntilde;/g,'n').replace(/&#[0-9]+;/g,'').replace(/&[a-z]+;/g,'')
    .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e').replace(/[íìï]/g,'i').replace(/[óòö]/g,'o').replace(/[úùü]/g,'u')
    .replace(/ñ/g,'n').replace(/[^a-z0-9 ]/g,'').trim();
}

function getFlow(key){
  var k = norm(key);
  if(k.indexOf('pantalon')>=0) return FLOWS['pantalon'];
  if(k.indexOf('dobladillo')>=0 && (k.indexOf('cremallera')>=0||k.indexOf('mas')>=0||k.indexOf('+')>=0)) return FLOWS['dobladillo + cremallera'];
  if(k.indexOf('dobladillo')>=0) return FLOWS['dobladillo'];
  if(k.indexOf('recogida')>=0||k.indexOf('domicilio')>=0) return FLOWS['recogida a domicilio'];
  if(k.indexOf('manana')>=0||k.indexOf('manana manana')>=0||k.indexOf('10')>=0) return FLOWS['manana manana'];
  if(k.indexOf('cortina')>=0) return FLOWS['cortinas'];
  if(k.indexOf('medida')>=0||k.indexOf('diseno')>=0) return FLOWS['medida'];
  if(k.indexOf('cremallera')>=0||k.indexOf('precio')>=0) return FLOWS['cremallera'];
  if(k.indexOf('taller')>=0||k.indexOf('llevo')>=0) return FLOWS['lo llevo al taller'];
  if(k.indexOf('tarda')>=0||k.indexOf('tiempo')>=0||k.indexOf('cuanto')>=0) return FLOWS['cuanto tarda'];
  if(k.indexOf('perfecto')>=0||k.indexOf('gracias')>=0||k.indexOf('genial')>=0) return FLOWS['todo perfecto'];
  if(k.indexOf('calle')>=0||k.indexOf('avenida')>=0||k.indexOf('sevilla')>=0||k.length>8) return FLOWS['direccion'];
  return FLOWS['default'];
}

function nowTime(){
  var d=new Date(); return d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
}

function addBotMsg(html){
  var row = document.createElement('div');
  row.className = 'msg bot';
  var bub = document.createElement('div');
  bub.className = 'bubble';
  // Handle *bold* markdown
  var txt = html.replace(/\*(.*?)\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  bub.innerHTML = '<div class="bubble-text">'+txt+'</div><div class="bubble-meta"><span class="bubble-time">'+nowTime()+'</span></div>';
  row.appendChild(bub);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function addUserMsg(txt){
  var row = document.createElement('div');
  row.className = 'msg user';
  var bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = '<div class="bubble-text">'+txt+'</div><div class="bubble-meta"><span class="bubble-time">'+nowTime()+'</span><svg class="tick" viewBox="0 0 16 11"><path class="tick-blue" d="M1 6l4 4L9 4m3-3l-7 9" stroke="#53bdeb" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path class="tick-blue" d="M6 6l4 4" stroke="#53bdeb" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg></div>';
  row.appendChild(bub);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  // Show typing status
  waStatus.textContent = 'en l\u00ednea';
}

function addTyping(){
  var div = document.createElement('div');
  div.className = 'typing-bubble';
  div.id = 'typing';
  div.innerHTML = '<div class="typing-dots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function clearOpts(){
  var old = chat.querySelectorAll('.qr-wrap');
  old.forEach(function(el){el.remove();});
}

function addOpts(opts){
  var wrap = document.createElement('div');
  wrap.className = 'qr-wrap';
  opts.forEach(function(o){
    var b = document.createElement('button');
    b.className = 'qr-btn';
    b.innerHTML = o;
    b.addEventListener('click', function(){
      clearOpts();
      var plain = b.innerText || b.textContent;
      addUserMsg(plain);
      setTimeout(function(){ runFlow(plain, 300); }, 100);
    });
    wrap.appendChild(b);
  });
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function runFlow(key, initialDelay){
  var flow = getFlow(key);
  var bots = []; var opts = null;
  flow.forEach(function(s){ if(s.b) bots.push(s); if(s.o) opts=s.o; });
  var t = initialDelay || 400;
  bots.forEach(function(s, i){
    var islast = (i===bots.length-1);
    (function(txt, td, dd, last){
      setTimeout(function(){
        var ty = addTyping();
        waStatus.textContent = 'escribiendo\u2026';
        setTimeout(function(){
          ty.remove();
          waStatus.textContent = 'en l\u00ednea';
          addBotMsg(txt);
          if(last && opts) setTimeout(function(){ addOpts(opts); }, 200);
        }, dd);
      }, td);
    })(s.b, t, s.d||900, islast);
    t += (s.d||900) + 400;
  });
  if(!bots.length && opts) setTimeout(function(){ addOpts(opts); }, 300);
}

function sendUser(){
  var v = cinput.value.trim();
  if(!v) return;
  cinput.value = '';
  sendbtn.style.display = 'none';
  micbtn.style.display = 'flex';
  clearOpts();
  addUserMsg(v);
  setTimeout(function(){ runFlow(v, 400); }, 100);
}
